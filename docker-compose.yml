services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: book-lending-api
    environment:
      APP_NAME: Book Lending System
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/book_lending
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: book-lending-db
    environment:
      POSTGRES_DB: book_lending
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d book_lending"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
